services:
  # MySQL 保存业务数据：原始文档、问题、检索结果、Prompt、答案和 token 日志。
  mysql:
    image: mysql:8.4
    container_name: rag-mysql
    environment:
      # 本地开发默认 root/root，生产环境不要使用这个密码。
      MYSQL_ROOT_PASSWORD: root
      # 应用启动后会在这个库里自动执行 schema.sql 建表。
      MYSQL_DATABASE: rag_demo
    ports:
      # 暴露给本机 Spring Boot 应用连接。
      - "3306:3306"
    volumes:
      # 持久化 MySQL 数据，删除 volumes 目录会清空本地数据。
      - ./volumes/mysql:/var/lib/mysql
    healthcheck:
      # Compose 用于判断 MySQL 是否已经可以接受连接。
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  # Milvus 依赖 etcd 存储元数据。
  etcd:
    image: quay.io/coreos/etcd:v3.5.18
    container_name: rag-milvus-etcd
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
      ETCD_SNAPSHOT_COUNT: "50000"
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    volumes:
      # 持久化 etcd 元数据。
      - ./volumes/etcd:/etcd

  # Milvus 依赖 MinIO 保存对象数据。
  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: rag-milvus-minio
    environment:
      # 本地开发默认账号，生产环境需要替换。
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    ports:
      # 9001 是 MinIO 控制台，9000 是对象存储 API。
      - "9001:9001"
      - "9000:9000"
    command: minio server /minio_data --console-address ":9001"
    volumes:
      # 持久化 MinIO 数据。
      - ./volumes/minio:/minio_data
    healthcheck:
      # 判断 MinIO 是否可用，Milvus 启动前需要它正常工作。
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # Milvus standalone 向量库，负责保存 embedding 向量并执行相似度检索。
  milvus:
    image: milvusdb/milvus:v2.5.14
    container_name: rag-milvus
    command: ["milvus", "run", "standalone"]
    security_opt:
      - seccomp:unconfined
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
      COMMON_STORAGETYPE: minio
    volumes:
      # 持久化 Milvus 本地数据。
      - ./volumes/milvus:/var/lib/milvus
    healthcheck:
      # 9091 是 Milvus 健康检查端口。
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      start_period: 90s
      timeout: 20s
      retries: 3
    ports:
      # 19530 是 Spring AI 连接 Milvus 的 gRPC 端口。
      - "19530:19530"
      # 9091 用于本机健康检查和排查启动状态。
      - "9091:9091"
    depends_on:
      - etcd
      - minio
